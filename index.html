<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Digital Habitat</title>
    <style>
        /* --- GLOBAL STYLES --- */
        :root {
            --trap-bg: linear-gradient(45deg, #ff007f, #ffaa00, #00ffcc);
            --trap-text: #ffffff;
            --symbiotic-bg: #121212; 
            --symbiotic-text: #e0e0e0;
            --accent: #4caf50;
            --focus-outline: 3px solid #4caf50; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html { scroll-behavior: smooth; }

        *:focus-visible {
            outline: var(--focus-outline);
            outline-offset: 2px;
        }

        /* --- THE TRAP (Extractive Model) --- */
        #the-trap {
            min-height: 180vh; 
            background: var(--trap-bg);
            background-size: 400% 400%;
            animation: gradientNoise 3s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6rem 1rem 2rem 1rem;
            position: relative;
        }

        @keyframes gradientNoise {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .fake-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            z-index: 10;
        }

        .fake-nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 0.5rem 1rem;
            background: #ff007f;
            border-radius: 4px;
        }

        .noise-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            color: var(--trap-text);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .trap-btn {
            background: #ffaa00;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 90%;
        }

        .modal-popup {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            z-index: 99;
            width: 90%;
            max-width: 350px;
            border: 5px solid #ff0000;
            transition: opacity 0.3s ease;
        }

        .runaway-x {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .runaway-x:hover { transform: translate(-50px, 50px); }

        .fake-chatbot {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 280px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #00ffcc;
            z-index: 98;
            color: black;
            overflow: hidden;
            transition: opacity 0.3s ease;
        }

        .chat-header {
            background: #00ffcc;
            color: #000;
            font-weight: bold;
            padding: 10px;
            text-align: center;
        }

        .chat-body {
            padding: 15px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ff0000;
            color: white;
            padding: 1.5rem;
            text-align: center;
            font-weight: bold;
            z-index: 100;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease;
        }

        /* --- THE TRANSITION --- */
        #transition {
            background: linear-gradient(to bottom, #ff007f, var(--symbiotic-bg));
            color: var(--symbiotic-text);
            text-align: center;
            padding: 15vh 2rem 5vh 2rem;
        }

        #transition h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #fff; }

        /* --- THE SYMBIOSIS (Ethical Model) --- */
        #the-symbiosis {
            background-color: var(--symbiotic-bg);
            color: var(--symbiotic-text);
            min-height: 100vh;
            padding: 2rem 2rem 6rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tabs-container {
            width: 100%;
            max-width: 800px;
            margin-top: 3rem;
        }

        .tab-list {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 2px solid #333;
            margin-bottom: 2rem;
        }

        .tab-button {
            background: transparent;
            color: #888;
            border: none;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-button[aria-selected="true"] {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
        }

        .tab-button:hover { color: #fff; }

        .tab-panel {
            display: none;
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 8px;
            line-height: 1.8;
            border-left: 4px solid var(--accent);
        }

        .tab-panel[data-active="true"] { display: block; }

        .tab-panel h2 { color: #fff; margin-bottom: 1rem; font-size: 1.8rem; }
        
        .placeholder-img {
            width: 100%;
            height: 200px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            margin: 1.5rem 0;
            border-radius: 4px;
        }

        .references {
            width: 100%;
            max-width: 800px;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #333;
            font-size: 0.9rem;
            color: #aaa;
        }

        .references h3 { color: #fff; margin-bottom: 1rem; }
        .references p { margin-bottom: 0.8rem; padding-left: 2em; text-indent: -2em; }
        .references a { color: var(--accent); text-decoration: none; }
        .references a:hover { text-decoration: underline; }

    </style>
</head>
